<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management System</title>
    <style>
        :root {
            --primary: #4a90e2;
            --danger: #e74c3c;
            --dark: #2c3e50;
            --light: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light);
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
        }

        h2 { text-align: center; color: var(--dark); }

        .input-group {
            margin-bottom: 15px;
        }

        label { display: block; margin-bottom: 5px; font-weight: bold; }

        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover { opacity: 0.9; }

        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
        }

        th, td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid #ddd;
        }

        .delete-btn {
            background-color: var(--danger);
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Student Registry</h2>
    
    <div class="input-group">
        <label>Student Name</label>
        <input type="text" id="studentName" placeholder="Enter name">
    </div>
    <div class="input-group">
        <label>Register Number</label>
        <input type="text" id="regNumber" placeholder="Enter register number">
    </div>
    <button onclick="addStudent()">Add Student</button>

    <table id="studentTable">
        <thead>
            <tr>
                <th>Name</th>
                <th>Reg. No</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            </tbody>
    </table>
</div>

<script>
    function addStudent() {
        const nameInput = document.getElementById('studentName');
        const regInput = document.getElementById('regNumber');
        const tableBody = document.querySelector('#studentTable tbody');

        if (nameInput.value === '' || regInput.value === '') {
            alert("Please fill in all fields");
            return;
        }

        const row = document.createElement('tr');

        row.innerHTML = `
            <td>${nameInput.value}</td>
            <td>${regInput.value}</td>
            <td><button class="delete-btn" onclick="deleteStudent(this)">Delete</button></td>
        `;

        tableBody.appendChild(row);

        nameInput.value = '';
        regInput.value = '';
    }

    function deleteStudent(button) {
        const row = button.parentElement.parentElement;
        row.remove();
    }
</script>

</body>
</html>
